# docker-compose.yml — Movie QA Service — Data plane (Phase 0)
#
# This file defines ONLY infrastructure services (databases, brokers, caches).
# Application services (rag, chat, auth, etc.) are added in their respective
# phases and defined in the same file, but kept separate via profiles so the
# data plane can be started alone during development with:
#
#   make infra-up   →  docker-compose --profile infra up -d
#   make up         →  docker-compose up -d  (all services, future phases)
#
# LEARNING: Using a single docker-compose.yml with profiles (rather than
# multiple files) keeps the port allocations visible in one place and avoids
# the confusion of `docker-compose -f a.yml -f b.yml` override chains.
#
# See docs/adr/0001-monorepo-structure.md for the decision to keep all
# services in one repo and one compose file.

services:

  # ── Postgres 16 ──────────────────────────────────────────────────────────────
  # Shared Postgres instance; each service owns a separate *schema* (not a
  # separate database). This makes cross-schema JOINs possible during
  # development while still enforcing logical boundaries.
  #
  # LEARNING: In production you'd run one Postgres cluster per bounded context
  # (or fully separate databases), but for a learning project on a laptop one
  # instance is fine. The schema-per-service pattern is documented in
  # docs/adr/0004-postgres-schema-per-service.md.
  postgres:
    image: postgres:16-alpine
    container_name: movieqa-postgres
    profiles: [infra]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-movieqa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: movieqa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init scripts run once on first start (alphabetical order).
      # We create one schema per service upfront so Flyway migrations
      # don't need superuser rights to CREATE SCHEMA.
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movieqa} -d movieqa"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  # Used for: HTTP session storage (auth service), response caching (chat),
  # and distributed rate limiting (gateway — future phase).
  redis:
    image: redis:7-alpine
    container_name: movieqa-redis
    profiles: [infra]
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant ───────────────────────────────────────────────────────────────────
  # Vector database for chunk embeddings. We use a dedicated vector DB rather
  # than pgvector because Qdrant's payload filtering is a better fit for our
  # hybrid retrieval needs. See docs/adr/0005-qdrant-over-pgvector.md.
  #
  # Ports:
  #   6333 — REST API (used by the Python SDK and the RAG service)
  #   6334 — gRPC API (faster for bulk upserts during ingestion)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: movieqa-qdrant
    profiles: [infra]
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── RabbitMQ 3 ───────────────────────────────────────────────────────────────
  # Message broker for the ingestion plane. The scheduler publishes
  # `ingest.requested` events; ingestion workers consume them.
  # See docs/adr/0003-rabbitmq-over-kafka.md.
  #
  # Management UI: http://localhost:15672  (user/pass from env)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: movieqa-rabbitmq
    profiles: [infra]
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-movieqa}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      # Enable the prometheus plugin so Grafana can scrape queue metrics.
      RABBITMQ_PLUGINS: "rabbitmq_management rabbitmq_prometheus"
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
      - "15692:15692"  # Prometheus metrics
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Nginx (API Gateway) ──────────────────────────────────────────────────────
  # Routes all inbound traffic to the right backend service.
  # Handles CORS, timeouts, and (from Phase 5) JWT validation via auth_request.
  # See docs/adr/0001-nginx-as-api-gateway.md and infra/nginx/nginx.conf.
  #
  # In development, application services (auth, chat, catalog) are started
  # separately with `./mvnw spring-boot:run`. Nginx expects them on the
  # Docker host network, so we use host.docker.internal in dev overrides.
  nginx:
    image: nginx:1.27-alpine
    container_name: movieqa-nginx
    profiles: [infra]
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

# ── Named volumes ─────────────────────────────────────────────────────────────
# Named volumes survive `docker-compose down` but are removed by
# `docker-compose down -v`. Never use -v in production without a backup.
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  rabbitmq_data:
