# ci.yml — Continuous Integration
#
# Runs on every push to main and on every pull request targeting main.
# Three jobs run in PARALLEL (Java, RAG, Frontend) so the total wall-clock
# time is the slowest job, not the sum of all jobs.
#
# LEARNING: Each job gets a fresh Ubuntu runner. Jobs share nothing by default —
# they can't see each other's files or processes. We use caching actions to
# avoid re-downloading Maven deps / npm packages / uv packages on every run.
#
# LEARNING: All test/lint commands go through the root Makefile rather than
# being duplicated here. This means CI and local development run the exact
# same commands — if you update a test flag in the Makefile, CI picks it up
# automatically without a separate change to this file.
#
# To see all runs: https://github.com/<your-org>/<your-repo>/actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit is pushed.
# Avoids wasting runner minutes on stale runs.
# LEARNING: `concurrency` with `cancel-in-progress: true` is a small but
# important quality-of-life setting — without it, every push queues a new run
# even if the previous one hasn't finished yet.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Java services (auth, chat, catalog, scheduler) ──────────────────────────
  test-java:
    name: Java — test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin   # Eclipse Temurin — free, well-maintained LTS build
          java-version: '21'
          # Cache the Maven local repository (~/.m2) so dependencies aren't
          # re-downloaded on every run. The cache key includes the POM files
          # so it's invalidated when dependencies change.
          cache: maven

      - name: Test all Java services
        run: make test-java

  # ── RAG service (Python / FastAPI) ──────────────────────────────────────────
  test-rag:
    name: RAG — lint + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        # LEARNING: astral-sh/setup-uv is the official GitHub Action for uv.
        # It installs uv, optionally caches the uv package cache, and sets
        # up the Python version declared in .python-version automatically.
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "services/rag/uv.lock"

      - name: Install dependencies
        run: cd services/rag && uv sync --dev

      - name: Lint + test
        run: make lint-rag test-rag

  # ── Frontend (React / Vite / TypeScript) ────────────────────────────────────
  test-frontend:
    name: Frontend — lint + typecheck + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Cache node_modules keyed on package-lock.json so npm install is
          # skipped when the lockfile hasn't changed.
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint + typecheck + test
        run: make lint-frontend test-frontend
