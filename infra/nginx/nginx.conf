# infra/nginx/nginx.conf
#
# Nginx acts as the API gateway for the Movie QA service.
# All traffic from the React frontend flows through here.
#
# See docs/adr/0001-nginx-as-api-gateway.md for why we chose Nginx
# over Spring Cloud Gateway.
#
# ── Routing table ─────────────────────────────────────────────────────────────
#   /auth/**     → auth service     :8081   (public — no JWT required)
#   /chat/**     → chat service     :8082   (protected — JWT required, Phase 5)
#   /catalog/**  → catalog service  :8083   (public — read-only)
#
# ── Phase 5 note ─────────────────────────────────────────────────────────────
# When auth is implemented, protected routes will use the auth_request module:
#
#   auth_request /internal/auth/validate;
#   auth_request_set $x_user_id $upstream_http_x_user_id;
#   proxy_set_header X-User-Id $x_user_id;
#
# The auth service will expose POST /internal/validate that returns 200 + the
# X-User-Id header on success, or 401 on failure. Nginx forwards the header
# downstream so individual services never need to parse JWTs themselves.
# ──────────────────────────────────────────────────────────────────────────────

# LEARNING: `upstream` blocks let you name a group of backend servers.
# Even with a single server, this pattern makes it trivial to add replicas
# later — just add more `server` lines and Nginx round-robins automatically.
upstream auth_service {
    server auth:8081;
    keepalive 32;  # reuse connections to the upstream — avoids TCP handshake overhead
}

upstream chat_service {
    server chat:8082;
    keepalive 32;
}

upstream catalog_service {
    server catalog:8083;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # match any hostname — fine for local dev and Docker

    # ── Common proxy headers ───────────────────────────────────────────────────
    # These are set once here and inherited by all location blocks below.
    # LEARNING: Without X-Forwarded-For, your backend services see Nginx's
    # internal Docker IP instead of the real client IP. Spring Boot's
    # ForwardedHeaderFilter reads these automatically.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow HTTP/1.1 keepalives to upstreams (required for keepalive directive above)
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Timeouts ──────────────────────────────────────────────────────────────
    # LLM calls can be slow. 120s covers even the worst cold-start + generation.
    # Lower values would cause Nginx to return 504 before the RAG service responds.
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;
    proxy_connect_timeout 10s;

    # ── Auth service (public) ─────────────────────────────────────────────────
    # /auth/signup and /auth/login must be reachable without a token.
    # Do NOT add auth_request here — that would be a chicken-and-egg problem.
    location /auth/ {
        proxy_pass http://auth_service;
    }

    # ── Chat service (protected in Phase 5) ───────────────────────────────────
    # Phase 5 TODO: uncomment the auth_request block below when the auth
    # service's /internal/validate endpoint is implemented.
    #
    # auth_request /internal/auth/validate;
    # auth_request_set $x_user_id $upstream_http_x_user_id;
    # proxy_set_header X-User-Id $x_user_id;
    location /chat/ {
        proxy_pass http://chat_service;

        # SSE (Server-Sent Events) support for Phase 6 streaming.
        # LEARNING: SSE requires buffering to be disabled — otherwise Nginx
        # will buffer the entire response before forwarding it, defeating
        # the purpose of streaming. X-Accel-Buffering: no tells Nginx
        # proxies to also disable buffering.
        proxy_buffering      off;
        proxy_cache          off;
        proxy_set_header     X-Accel-Buffering no;
    }

    # ── Catalog service (public, read-only) ───────────────────────────────────
    location /catalog/ {
        proxy_pass http://catalog_service;

        # Cache catalog responses in the future — movie data changes rarely.
        # Phase 8 TODO: add proxy_cache_valid rules here.
    }

    # ── Internal auth validation endpoint (Phase 5) ───────────────────────────
    # This location is marked `internal` — only reachable via auth_request,
    # not directly from the outside. Prevents clients from calling it directly.
    location = /internal/auth/validate {
        internal;
        proxy_pass              http://auth_service/auth/validate;
        proxy_pass_request_body off;    # validation only needs the Authorization header
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    # Docker and load balancers can hit this without touching upstream services.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
